<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#1a1a2e"/>
  <!-- Face -->
  <circle cx="256" cy="256" r="160" fill="#f5c5a3"/>
  <!-- Left lens -->
  <rect x="100" y="210" width="120" height="80" rx="40" fill="#111"/>
  <!-- Right lens -->
  <rect x="292" y="210" width="120" height="80" rx="40" fill="#111"/>
  <!-- Bridge -->
  <rect x="220" y="240" width="72" height="12" rx="6" fill="#333"/>
  <!-- Frame top-left -->
  <rect x="96" y="205" width="128" height="16" rx="8" fill="#333"/>
  <!-- Frame top-right -->
  <rect x="288" y="205" width="128" height="16" rx="8" fill="#333"/>
  <!-- Left arm -->
  <rect x="60" y="218" width="44" height="12" rx="6" fill="#333"/>
  <!-- Right arm -->
  <rect x="408" y="218" width="44" height="12" rx="6" fill="#333"/>
  <!-- Smile -->
  <path d="M 190 320 Q 256 370 322 320" stroke="#c0845a" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Lens shine left -->
  <ellipse cx="135" cy="230" rx="18" ry="10" fill="white" opacity="0.15"/>
  <!-- Lens shine right -->
  <ellipse cx="327" cy="230" rx="18" ry="10" fill="white" opacity="0.15"/>
</svg>
